# Configuration Properties

# IP address of the coordinator (root.py) server
# - Emulator: use 10.0.2.2 (Android emulator gateway to host machine)
# - Physical phone on WireGuard VPN: use coordinator's WireGuard IP (e.g. 10.8.0.2)
server_ip=10.0.2.2

# Override for this device's own IP as registered with the coordinator.
# Leave blank to use auto-detected interface IP (default).
# Set this when the auto-detected IP is not reachable by other nodes, e.g.:
# - Emulator: set to the host machine's WireGuard IP (e.g. 10.8.0.2)
# - Physical phone on WireGuard VPN: set to the phone's WireGuard IP (e.g. 10.8.0.5)
device_ip=