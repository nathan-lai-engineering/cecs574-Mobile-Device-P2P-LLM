services:
  coordinator:
    image: aether-coordinator          # use pre-built image (run `docker build -t aether-coordinator .` first)
    container_name: lingualink_node_1
    stdin_open: true                   # -i
    tty: true                          # -t
    working_dir: /app
    entrypoint: /bin/bash
    volumes:
      - .:/app                                              # live-edit source without rebuilding
      - C:\CSULB\llama-2-7b:/app/llama-2-7b                # LLaMA-2 weights
    ports:
      - "23456:23456"   # ZMQ ROUTER (device registration + model transfer)
      - "34567:34567"   # monitor port
