services:
  coordinator:
    image: lingualinked-coordinator     # use pre-built image (run `docker build -t lingualinked-coordinator .` first)
    container_name: lingualink_node_1
    stdin_open: true                   # -i
    tty: true                          # -t
    working_dir: /app
    entrypoint: /bin/bash
    volumes:
      - .:/app                                              # live-edit source without rebuilding
      - ${MODEL_PATH:-/opt/models/llama-2-7b}:/app/llama-2-7b  # set MODEL_PATH env var to your weights dir
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "23456:23456"   # ZMQ ROUTER (device registration + model transfer)
      - "34567:34567"   # monitor port
